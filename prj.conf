# Zephyr kernel config — Smart Vending Machine (Nucleo-F446RE)

# Threading
CONFIG_MULTITHREADING=y
CONFIG_NUM_PREEMPT_PRIORITIES=16

# Serial / UART
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# SPI (servo PWM via timer, display)
CONFIG_SPI=y
CONFIG_PWM=y

# I2C (LCD)
CONFIG_I2C=y

# GPIO (keypad, ultrasonic, LEDs)
CONFIG_GPIO=y

# Timing
CONFIG_COUNTER=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
